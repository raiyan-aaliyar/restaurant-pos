name: yarpay
description: Production-ready Restaurant POS foundation built with Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^15.1.2
  intl: ^0.20.2

  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1
  pdf: ^3.11.2
  printing: ^5.13.4
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
